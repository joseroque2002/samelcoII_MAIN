<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Management - SAMELCO II</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;1,500&family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <script src="../js/supabase-config.js"></script>
</head>
<body class="page-teams">
  <div class="bg-image" aria-hidden="true"></div>
  <div class="noise"></div>
  <div class="orb orb-1"></div>

  <nav class="nav">
    <div class="nav-inner">
      <a href="dashboard.html" class="nav-logo">
        <span class="nav-logo-icon" aria-hidden="true">
          <img src="../assets/images/logo.png" alt="SAMELCO II logo" class="nav-logo-img">
        </span>
        <span class="nav-logo-text">
          <span class="nav-logo-title">SAMELCO II</span>
          <span class="nav-logo-sub">SAMAR ELECTRIC COOPERATIVE, INC.</span>
        </span>
      </a>
      <div class="nav-right">
        <div class="nav-links">
          <a href="dashboard.html" class="nav-link">Home</a>
          <a href="records.html" class="nav-link">Records</a>
          <a href="analytics.html" class="nav-link">Analytics</a>
          <a href="teams.html" class="nav-link" aria-current="page">Teams</a>
          <a href="contact.html" class="nav-link">Contact</a>
          <a href="about.html" class="nav-link">About</a>
        </div>
        <span class="nav-user-welcome">Welcome, <span id="user-name">User</span></span>
        <button type="button" class="nav-btn nav-btn-cta" id="logout-btn">Logout</button>
      </div>
    </div>
  </nav>

  <section class="records-section">
    <div class="records-container">
      <div class="records-banner">
        <div class="records-banner-text">
          <h1 class="records-banner-title">Team Management</h1>
          <p class="records-banner-sub">View and manage dispatch teams availability.</p>
        </div>
        <div class="records-banner-actions">
          <button type="button" class="nav-btn nav-btn-cta" id="add-team-btn">+ Add New Team</button>
        </div>
      </div>

      <div class="team-filters">
        <span class="filter-label">Filter by:</span>
        <button type="button" class="team-filter-btn is-active" data-filter="all">All</button>
        <button type="button" class="team-filter-btn" data-filter="available">Available</button>
        <button type="button" class="team-filter-btn" data-filter="unavailable">Unavailable</button>
      </div>

      <div class="teams-dashboard-grid" id="teams-grid">
        <!-- Team Cards will be loaded here -->
      </div>
    </div>
  </section>

  <!-- Add Team Modal -->
  <div id="team-modal" class="modal modal-overlay" style="display:none; position:fixed; z-index:10000; left:0; top:0; width:100%; height:100%;">
    <div class="modal-content modal-content-styled" style="background:#fff; margin:10% auto; padding:2rem; border-radius:16px; width:90%; max-width:400px;">
      <h2 style="margin-top:0; color:#8b2a2a; font-family:'Outfit', sans-serif; font-weight:700;">Add New Team</h2>
      <div style="margin-top:1.5rem;">
        <label for="new-team-name" style="display:block; margin-bottom:0.5rem; font-weight:600; color:#475569;">Team Name</label>
        <input type="text" id="new-team-name" class="form-input" style="width:100%; padding:0.75rem; border:2px solid #e2e8f0; border-radius:10px; font-family:inherit;" placeholder="e.g. Line Crew C">
      </div>
      <div style="margin-top:2rem; display:flex; gap:1rem; justify-content:flex-end;">
        <button type="button" id="cancel-team-btn" class="team-btn team-btn-toggle">Cancel</button>
        <button type="button" id="save-team-btn" class="nav-btn nav-btn-cta" style="margin:0; height:42px; padding:0 1.5rem;">Save Team</button>
      </div>
    </div>
  </div>

  <script src="../js/teams.js"></script>
</body>
</html>
